name: Build iOS App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate iOS project
        run: |
          rm -rf ios/
          flutter create --platforms=ios .

      - name: Fetch Dependencies & Gen Podfile
        run: |
          flutter pub get
          flutter build ios --config-only || true

      - name: Add iOS Permissions
        run: |
          plutil -insert UIBackgroundModes -json '["audio"]' ios/Runner/Info.plist
          plutil -insert NSPhotoLibraryUsageDescription -string "ローカルの音楽ファイルを読み込むためにアクセス権限が必要です。" ios/Runner/Info.plist
          plutil -insert NSAppleMusicUsageDescription -string "ローカルの音楽ファイルを読み込むためにアクセス権限が必要です。" ios/Runner/Info.plist

      - name: Patch Podfile for Rust/Strap
        run: |
          python3 -c "
          import sys
          import re
          
          try:
              with open('ios/Podfile', 'r') as f:
                  content = f.read()
                  
              # iOSバージョンを13.0に強制固定
              content = re.sub(r'^#? ?platform :ios.*', \"platform :ios, '13.0'\", content, flags=re.MULTILINE)
              
              # 必要な部品が捨てられないように設定を追加
              target_str = 'flutter_additional_ios_build_settings(target)'
              injection = target_str + '\n      target.build_configurations.each do |config|\n        config.build_settings[\"STRIP_STYLE\"] = \"non-global\"\n        config.build_settings[\"DEAD_CODE_STRIPPING\"] = \"NO\"\n        config.build_settings[\"IPHONEOS_DEPLOYMENT_TARGET\"] = \"13.0\"\n      end'
              
              content = content.replace(target_str, injection)
              
              with open('ios/Podfile', 'w') as f:
                  f.write(content)
              print('Podfile successfully patched')
          except Exception as e:
              print(f'Error: {e}')
              sys.exit(1)
          "

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Package into IPA
        run: |
          mkdir Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -qq -r my_music_player.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: my_music_player-ios
          path: my_music_player.ipa